<svg width="700" height="620" viewBox="0 0 700 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="700" height="620" fill="#0c1018"/>

  <!-- BigQuery -->
  <rect x="200" y="30" width="300" height="58" rx="10" fill="#0e2a3a" stroke="#1e4a5f" stroke-width="1"/>
  <text x="350" y="54" text-anchor="middle" fill="#7dd3fc" font-size="15" font-weight="600">BigQuery — TheLook eCommerce</text>
  <text x="350" y="74" text-anchor="middle" fill="#64748b" font-size="12">Public warehouse · orders, items, products</text>
  <line x1="350" y1="88" x2="350" y2="122" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- dbt semantic layer -->
  <rect x="170" y="122" width="360" height="58" rx="10" fill="#0d2a1f" stroke="#1c4d38" stroke-width="1"/>
  <text x="350" y="146" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="600">dbt semantic layer</text>
  <text x="350" y="166" text-anchor="middle" fill="#64748b" font-size="12">Staging → fact table → 12 governed metrics (MetricFlow)</text>
  <line x1="350" y1="180" x2="350" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Claude agent -->
  <rect x="200" y="214" width="300" height="58" rx="10" fill="#1e1b34" stroke="#3c3489" stroke-width="1"/>
  <text x="350" y="238" text-anchor="middle" fill="#a5b4fc" font-size="15" font-weight="600">Claude agent</text>
  <text x="350" y="258" text-anchor="middle" fill="#64748b" font-size="12">Resolves question to a governed metric</text>

  <line x1="290" y1="272" x2="220" y2="306" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="272" x2="480" y2="306" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Governed path -->
  <rect x="60" y="306" width="240" height="58" rx="10" fill="#0d2a1f" stroke="#1c4d38" stroke-width="1"/>
  <text x="180" y="330" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="600">Governed path</text>
  <text x="180" y="350" text-anchor="middle" fill="#64748b" font-size="12">Approved definition only</text>

  <!-- Raw path -->
  <rect x="400" y="306" width="240" height="58" rx="10" fill="#2a230d" stroke="#4d401c" stroke-width="1"/>
  <text x="520" y="330" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="600">Raw path</text>
  <text x="520" y="350" text-anchor="middle" fill="#64748b" font-size="12">AI guesses the definition</text>

  <line x1="180" y1="364" x2="300" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="364" x2="400" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Trust score engine -->
  <rect x="200" y="410" width="300" height="58" rx="10" fill="#1e1b34" stroke="#3c3489" stroke-width="1"/>
  <text x="350" y="434" text-anchor="middle" fill="#a5b4fc" font-size="15" font-weight="600">Trust score engine</text>
  <text x="350" y="454" text-anchor="middle" fill="#64748b" font-size="12">0–100 · mapping · agreement · execution</text>
  <line x1="350" y1="468" x2="350" y2="502" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Streamlit app -->
  <rect x="200" y="502" width="300" height="58" rx="10" fill="#141b27" stroke="#1e293b" stroke-width="1"/>
  <text x="350" y="526" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="600">Streamlit app</text>
  <text x="350" y="546" text-anchor="middle" fill="#64748b" font-size="12">Answer + trust badge + evidence</text>

  <text x="350" y="592" text-anchor="middle" fill="#475569" font-size="11" font-family="monospace">TrustMetrics — governed AI analyst with trust scoring</text>
</svg>
